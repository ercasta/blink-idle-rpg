name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/blink-compiler-ts/package-lock.json

      - name: Install compiler dependencies
        run: |
          cd packages/blink-compiler-ts && npm ci && cd ../..
          cd packages/blink-engine-wasm-js && npm install && cd ../..

      - name: Build TypeScript compiler
        run: |
          cd packages/blink-compiler-ts
          npm run build
          cd ../..

      - name: Set up Rust + wasm-pack
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          source "$HOME/.cargo/env"
          rustup target add wasm32-unknown-unknown
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM engine
        run: |
          source "$HOME/.cargo/env"
          cd packages/blink-engine-wasm-js
          node build.js
          cd ../..

      - name: Install WASM into React app
        run: node scripts/install-wasm.js

      - name: Build React web app
        run: |
          cd game/app
          npm install
          npm run build
          cd ../..

      - name: Prepare deployment
        run: |
          mkdir -p _site
          touch _site/.nojekyll
          cp -r game/app/dist/* _site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
